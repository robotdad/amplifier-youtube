bundle:
  name: youtube-dl-behavior
  version: 1.0.0
  description: Adds YouTube download capability (audio, video, screenshot) to any Amplifier session

tools:
  - module: tool-youtube-dl
    source: git+https://github.com/microsoft/amplifier-module-tool-youtube-dl@main
    config:
      output_dir: ~/downloads
      audio_only: true

context:
  include:
    - youtube-dl:context/instructions.md
